name: Doxygen

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      build_pdf:
        description: "Build the LaTeX PDF artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DOXYGEN_VERSION: "1.12.0"
  DOXYGEN_PREFIX: "${{ github.workspace }}/.doxygen"

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            cmake \
            flex \
            graphviz \
            python3

      - name: Install LaTeX dependencies
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        run: |
          sudo apt-get install -y \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Cache Doxygen build
        id: cache-doxygen
        uses: actions/cache@v4
        with:
          path: ${{ env.DOXYGEN_PREFIX }}
          key: ${{ runner.os }}-doxygen-${{ env.DOXYGEN_VERSION }}

      - name: Build Doxygen from source
        if: steps.cache-doxygen.outputs.cache-hit != 'true'
        run: |
          curl -fsSLO "https://www.doxygen.nl/files/doxygen-${DOXYGEN_VERSION}.src.tar.gz"
          tar -xzf "doxygen-${DOXYGEN_VERSION}.src.tar.gz"
          cmake \
            -S "doxygen-${DOXYGEN_VERSION}" \
            -B "doxygen-${DOXYGEN_VERSION}/build" \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${DOXYGEN_PREFIX}"
          cmake --build "doxygen-${DOXYGEN_VERSION}/build" --parallel "$(nproc)"
          cmake --install "doxygen-${DOXYGEN_VERSION}/build"

      - name: Add Doxygen to PATH
        run: echo "${DOXYGEN_PREFIX}/bin" >> "${GITHUB_PATH}"

      - name: Verify Doxygen
        run: |
          doxygen --version
          test "$(doxygen --version)" = "${DOXYGEN_VERSION}"
          dot -V

      - name: Clean previous generated docs
        run: |
          rm -rf docs/html docs/latex doxygen_warnings.log

      - name: Generate current Doxygen docs
        run: |
          doxygen Doxyfile

      - name: Verify deploy entrypoint
        run: |
          test -f docs/html/index.html

      - name: Commit and push documentation changes
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update Doxygen documentation [skip ci]"
            git push
          fi

      - name: Build PDF from LaTeX
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        run: |
          test -f docs/latex/Makefile
          make -C docs/latex

      - name: Summarize Doxygen warnings
        if: always()
        run: |
          if [ -s doxygen_warnings.log ]; then
            echo "Doxygen warnings:"
            wc -l doxygen_warnings.log
            sed -n '1,120p' doxygen_warnings.log
          else
            echo "No Doxygen warnings log was generated."
          fi

      - name: Upload HTML documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/html
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Upload warning log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-warnings
          path: doxygen_warnings.log
          if-no-files-found: ignore

      - name: Upload PDF documentation
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-pdf
          path: docs/latex/refman.pdf
          if-no-files-found: error

  deploy:
    name: Deploy GitHub Pages
    needs: docs
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy docs/html to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
