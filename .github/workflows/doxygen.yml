name: Doxygen

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      build_pdf:
        description: "Build the LaTeX PDF artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    name: Build documentation
    if: ${{ github.event_name != 'push' || github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz

      - name: Install LaTeX dependencies
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        run: |
          sudo apt-get install -y \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Verify Doxygen installation
        run: |
          doxygen --version
          dot -V

      - name: Clean previous generated docs
        run: |
          rm -rf docs/html docs/latex .doxygen/doxygen_warnings.log

      - name: Generate current Doxygen docs
        run: |
          cd .doxygen && doxygen Doxyfile

      - name: Create .nojekyll files for GitHub Pages
        run: |
          touch docs/.nojekyll
          touch docs/html/.nojekyll

      - name: Verify deploy entrypoint
        run: |
          test -f docs/html/index.html

      - name: Commit generated documentation
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No generated documentation changes to commit."
          else
            git commit -m "docs: update Doxygen documentation [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Build PDF from LaTeX
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        run: |
          test -f docs/latex/Makefile
          make -C docs/latex

      - name: Summarize Doxygen warnings
        if: always()
        run: |
          if [ -s .doxygen/doxygen_warnings.log ]; then
            echo "Doxygen warnings:"
            wc -l .doxygen/doxygen_warnings.log
            sed -n '1,120p' .doxygen/doxygen_warnings.log
          else
            echo "No Doxygen warnings log was generated."
          fi

      - name: Upload HTML documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/html
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: docs/html

      - name: Upload warning log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-warnings
          path: .doxygen/doxygen_warnings.log
          if-no-files-found: ignore

      - name: Upload PDF documentation
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_pdf) }}
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-pdf
          path: docs/latex/refman.pdf
          if-no-files-found: error

  deploy:
    name: Deploy GitHub Pages
    needs: docs
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy docs/html to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
